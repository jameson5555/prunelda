<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aunt Prunelda's Inheritance Player</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Georgia, 'Times New Roman', serif;
        background: #0f0d12;
        color: #e6decf;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.5rem;
        padding: 0.5rem;
        background:
          radial-gradient(circle at top, rgba(180, 141, 88, 0.28), transparent 34%),
          linear-gradient(180deg, #1c161d, #0f0d12 42%, #09080c 100%);
        touch-action: manipulation;
      }

      .frame {
        width: min(100%, 1100px);
        border: 1px solid rgba(208, 183, 132, 0.35);
        border-radius: 18px;
        padding: 0.65rem;
        background: rgba(12, 10, 15, 0.78);
        box-shadow: 0 18px 60px rgba(0, 0, 0, 0.4);
      }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 0.6rem;
        margin-bottom: 0.5rem;
      }

      .toolbar-meta {
        color: rgba(230, 222, 207, 0.72);
        font-size: 0.95rem;
      }

      .toolbar-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
      }

      #canvas {
        display: block;
        width: 100%;
        max-width: 100%;
        margin: 0 auto;
        aspect-ratio: 4 / 3;
        border: 0;
        outline: none;
        background: #000;
      }

      .status {
        min-height: 1.5rem;
        text-align: center;
        color: rgba(230, 222, 207, 0.72);
        font-size: 0.95rem;
        margin-top: 0.5rem;
      }

      button,
      a.button {
        border: 1px solid rgba(208, 183, 132, 0.45);
        background: rgba(45, 32, 27, 0.9);
        color: #f7efe1;
        border-radius: 999px;
        padding: 0.7rem 1rem;
        font: inherit;
        text-decoration: none;
        cursor: pointer;
      }

      button:hover,
      a.button:hover {
        background: rgba(83, 56, 47, 0.95);
      }

      #output,
      #controls,
      #progress,
      #spinner {
        display: none;
      }

      .controls-note {
        margin-top: 0.5rem;
        text-align: center;
        color: rgba(230, 222, 207, 0.62);
        font-size: 0.88rem;
      }

      @media (max-width: 700px) {
        body {
          padding: 0.6rem;
        }

        .frame {
          padding: 0.5rem;
          border-radius: 14px;
        }

        .toolbar {
          flex-direction: column;
          align-items: stretch;
        }

        .toolbar-actions {
          width: 100%;
        }

        .toolbar-actions > * {
          flex: 1 1 0;
          text-align: center;
        }
      }
    </style>
  </head>
  <body>
    <main class="frame">
      <div class="toolbar">
        <div class="toolbar-meta">F1 Help, F2 Start, F3 Select, F4 Option</div>
        <div class="toolbar-actions">
          <button id="mute-button" type="button">Mute</button>
          <button id="reset-button" type="button">Reset</button>
          <button id="fullscreen-button" type="button">Fullscreen</button>
          <a class="button" href="../">Back</a>
        </div>
      </div>
      <canvas id="canvas" oncontextmenu="event.preventDefault()" width="672" height="450" tabindex="0"></canvas>
      <div class="status" id="status"></div>
      <div class="controls-note">Arrow keys move. Left Option fires. Symbols follow the Atari keyboard layout.</div>
    </main>

    <textarea id="output" rows="4"></textarea>
    <div id="controls"></div>
    <progress value="0" max="0" id="progress"></progress>
    <div id="spinner"></div>

    <script type="text/javascript" src="vendor/js/emularity/es6-promise.js"></script>
    <script type="text/javascript" src="vendor/js/emularity/browserfs.min.js"></script>
    <script type="text/javascript" src="vendor/js/emularity/loader.js"></script>
    <script>
      const DEFAULT_DISK = 'prunelda.atr'
      const statusElement = document.getElementById('status')
      let emulator

      function getUrlParam(name) {
        const params = new URLSearchParams(window.location.search)
        return params.get(name) || ''
      }

      const diskFilename = decodeURIComponent(getUrlParam('disk_filename') || getUrlParam('disk') || DEFAULT_DISK)

      function setStatus(text) {
        statusElement.textContent = text
      }

      function bootEmulator() {
        setStatus('Loading emulator...')

        const mountDisk = JSMESSLoader.mountFile(
          'disk1.atr',
          JSMESSLoader.fetchFile('Disk', 'data/' + diskFilename)
        )

        const diskPeripheral = JSMESSLoader.peripheral('flop1', 'disk1.atr')

        emulator = new Emulator(
          document.querySelector('#canvas'),
          null,
          new JSMESSLoader(
            JSMESSLoader.driver('a800xl'),
            JSMESSLoader.nativeResolution(672, 450),
            JSMESSLoader.scale(1.2),
            JSMESSLoader.mountFile(
              'a800xl.zip',
              JSMESSLoader.fetchFile('BIOS', 'vendor/emulators/mame/a800xl-bd.zip')
            ),
            JSMESSLoader.mountFile(
              'a800xl.cfg',
              JSMESSLoader.fetchFile('Config', 'vendor/emulators/mame/a800xl.cfg')
            ),
            mountDisk,
            diskPeripheral,
            JSMESSLoader.emulatorJS('vendor/js/emulators/mame/mamea800xl.js'),
            JSMESSLoader.emulatorWASM('vendor/js/emulators/mame/mamea800xl.wasm'),
            JSMESSLoader.extraArgs([''])
          )
        )

        emulator.start({ waitAfterDownloading: true })
        window.setTimeout(() => setStatus(''), 2000)
      }

      document.getElementById('mute-button').addEventListener('click', () => {
        if (emulator) {
          emulator.toggleMute()
        }
      })

      document.getElementById('reset-button').addEventListener('click', () => {
        window.location.reload()
      })

      document.getElementById('fullscreen-button').addEventListener('click', () => {
        const canvas = document.getElementById('canvas')
        if (canvas.requestFullscreen) {
          canvas.requestFullscreen()
        }
      })

      bootEmulator()
    </script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aunt Prunelda's Inheritance Player</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Georgia, 'Times New Roman', serif;
        background: #0f0d12;
        color: #e6decf;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.5rem;
        padding: 0.5rem;
        background:
          radial-gradient(circle at top, rgba(180, 141, 88, 0.28), transparent 34%),
          linear-gradient(180deg, #1c161d, #0f0d12 42%, #09080c 100%);
        touch-action: manipulation;
      }

      .frame {
        width: min(100%, 1100px);
        border: 1px solid rgba(208, 183, 132, 0.35);
        border-radius: 18px;
        padding: 0.65rem;
        background: rgba(12, 10, 15, 0.78);
        box-shadow: 0 18px 60px rgba(0, 0, 0, 0.4);
      }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 0.6rem;
        margin-bottom: 0.5rem;
      }

      .toolbar-meta {
        color: rgba(230, 222, 207, 0.72);
        font-size: 0.95rem;
      }

      .toolbar-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
      }

      canvas.emscripten {
        display: block;
        width: 100%;
        max-width: 100%;
        margin: 0 auto;
        aspect-ratio: 4 / 3;
        border: 0;
        outline: none;
        background: #000;
      }

      .status {
        min-height: 1.5rem;
        text-align: center;
        color: rgba(230, 222, 207, 0.72);
        font-size: 0.95rem;
        margin-top: 0.5rem;
      }

      button,
      a.button {
        border: 1px solid rgba(208, 183, 132, 0.45);
        background: rgba(45, 32, 27, 0.9);
        color: #f7efe1;
        border-radius: 999px;
        padding: 0.7rem 1rem;
        font: inherit;
        text-decoration: none;
        cursor: pointer;
      }

      button:hover,
      a.button:hover {
        background: rgba(83, 56, 47, 0.95);
      }

      #output,
      #controls,
      #progress,
      #spinner {
        display: none;
      }

      @media (max-width: 700px) {
        body {
          padding: 0.6rem;
        }

        .frame {
          padding: 0.5rem;
          border-radius: 14px;
        }

        .toolbar {
          flex-direction: column;
          align-items: stretch;
        }

        .toolbar-actions {
          width: 100%;
        }

        .toolbar-actions > * {
          flex: 1 1 0;
          text-align: center;
        }
      }
    </style>
  </head>
  <body>
    <main class="frame">
      <div class="toolbar">
        <div class="toolbar-meta">If you land on EDIT, use Start Game.</div>
        <div class="toolbar-actions">
          <button id="start-button" type="button">Start Game</button>
          <button id="reset-button" type="button">Reset</button>
          <button id="fullscreen-button" type="button">Fullscreen</button>
          <a class="button" href="../">Back</a>
        </div>
      </div>
      <canvas
        class="emscripten"
        id="canvas"
        oncontextmenu="event.preventDefault()"
        width="800"
        height="600"
        tabindex="0"
      ></canvas>
      <div class="status" id="status"></div>
    </main>

    <textarea id="output" rows="4"></textarea>
    <div id="controls"></div>
    <progress value="0" max="0" id="progress"></progress>
    <div id="spinner"></div>

    <script>
      const DEFAULT_DISK = 'prunelda.atr'
      const AUTORUN_COMMAND = 'RUN "D:AUNTPRUN"'
      const AUTORUN_DELAY_MS = 1800
      let startupAttempted = false

      function getUrlParam(name) {
        const params = new URLSearchParams(window.location.search)
        return params.get(name) || ''
      }

      const diskFilename = decodeURIComponent(getUrlParam('disk_filename') || DEFAULT_DISK)
      const statusElement = document.getElementById('status')
      const progressElement = document.getElementById('progress')
      const spinnerElement = document.getElementById('spinner')

      var PACKAGE_NAME = './data/A8E.data'

      function performDataRequests(DataRequest) {
        new DataRequest(0, 8192, 0, 0).open('GET', 'data/ATARIBAS.ROM')
        new DataRequest(8192, 24576, 0, 0).open('GET', 'data/ATARIXL.ROM')
        new DataRequest(24576, 116752, 0, 0).open('GET', 'data/' + diskFilename)
      }

      function performDataRequestLoads(DataRequest) {
        DataRequest.prototype.requests['data/ATARIBAS.ROM'].onload()
        DataRequest.prototype.requests['data/ATARIXL.ROM'].onload()
        DataRequest.prototype.requests['data/' + diskFilename].onload()
      }

      function getKeyMapping(character) {
        if (character === '\r') {
          return { key: 'Enter', code: 'Enter', keyCode: 13, charCode: 13 }
        }

        if (character === ' ') {
          return { key: ' ', code: 'Space', keyCode: 32, charCode: 32 }
        }

        if (character === '"') {
          return { key: '"', code: 'Quote', keyCode: 222, charCode: 34 }
        }

        if (character === ':') {
          return { key: ':', code: 'Semicolon', keyCode: 186, charCode: 58 }
        }

        const upper = character.toUpperCase()
        return {
          key: upper,
          code: `Key${upper}`,
          keyCode: upper.charCodeAt(0),
          charCode: upper.charCodeAt(0),
        }
      }

      function createKeyboardEvent(type, mapping) {
        const event = new KeyboardEvent(type, {
          key: mapping.key,
          code: mapping.code,
          bubbles: true,
          cancelable: true,
        })

        Object.defineProperty(event, 'keyCode', { get: () => mapping.keyCode })
        Object.defineProperty(event, 'which', {
          get: () => (type === 'keypress' ? mapping.charCode : mapping.keyCode),
        })
        Object.defineProperty(event, 'charCode', {
          get: () => (type === 'keypress' ? mapping.charCode : 0),
        })

        return event
      }

      function emitKey(character) {
        const canvas = document.getElementById('canvas')
        const mapping = getKeyMapping(character)
        const targets = [canvas, document, window]

        canvas.focus()
        canvas.click()

        targets.forEach((target) => target.dispatchEvent(createKeyboardEvent('keydown', mapping)))

        if (mapping.charCode) {
          targets.forEach((target) => target.dispatchEvent(createKeyboardEvent('keypress', mapping)))
        }

        targets.forEach((target) => target.dispatchEvent(createKeyboardEvent('keyup', mapping)))
      }

      function queueCommand(command) {
        statusElement.textContent = 'Starting game...'
        command.split('').concat('\r').forEach((character, index) => {
          window.setTimeout(() => emitKey(character), 140 * index)
        })
      }

      function startGame(force = false) {
        if (startupAttempted && !force) {
          return
        }

        startupAttempted = true
        queueCommand(AUTORUN_COMMAND)
      }

      var Module = {
        preRun: [],
        postRun: [() => window.setTimeout(() => startGame(false), AUTORUN_DELAY_MS)],
        canvas: document.getElementById('canvas'),
        arguments: ['data/' + diskFilename],
        print: (function () {
          const element = document.getElementById('output')
          element.value = ''
          return function (text) {
            element.value += Array.prototype.slice.call(arguments).join(' ') + '\n'
            element.scrollTop = element.scrollHeight
          }
        })(),
        printErr: function (text) {
          console.log(Array.prototype.slice.call(arguments).join(' '))
        },
        setStatus: function (text) {
          if (!text) {
            statusElement.textContent = ''
            return
          }
          const match = text.match(/([^(]+)\((\d+(?:\.\d+)?)\/(\d+)\)/)
          if (match) {
            progressElement.value = parseInt(match[2], 10) * 100
            progressElement.max = parseInt(match[3], 10) * 100
          }
          statusElement.textContent = text
          spinnerElement.hidden = !text
        },
        totalDependencies: 0,
        monitorRunDependencies: function (left) {
          this.totalDependencies = Math.max(this.totalDependencies, left)
          Module.setStatus(
            left
              ? 'Preparing emulator... (' + (this.totalDependencies - left) + '/' + this.totalDependencies + ')'
              : 'Booting disk...'
          )
        },
      }

      Module.setStatus('Downloading emulator...')

      document.getElementById('start-button').addEventListener('click', () => {
        startGame(true)
      })

      document.getElementById('reset-button').addEventListener('click', () => {
        window.location.reload()
      })

      document.getElementById('fullscreen-button').addEventListener('click', () => {
        const canvas = document.getElementById('canvas')
        if (canvas.requestFullscreen) {
          canvas.requestFullscreen()
        }
      })
    </script>
    <script async type="text/javascript" src="js/A8E.js"></script>
  </body>
</html>
